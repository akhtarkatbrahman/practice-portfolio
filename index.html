<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/images/t2Logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="src/style.css" />
    <title>T2-Class Project</title>
  </head>
  <body class="bg-[#121212] text-[#fdfdfd]">
    <div class="main">
      <nav class="flex items-center justify-between container mx-auto">
        <div class="nav-logo px-4 py-5">
          <a href="/"
            ><img
              src="images/logo-black-bg.jpeg"
              alt="logo"
              class="mix-blend-lighten w-50 h-15"
          /></a>
        </div>
        <div class="nav-links">
          <ul class="flex items-center justify-center gap-5">
            <li class="link text-[20px] font-bold">
              <a
                href="#about"
                class="hover:underline hover:text-gray-300 uppercase"
                >About</a
              >
            </li>
            <li class="link text-[20px] font-bold">
              <a
                href="#skills"
                class="hover:underline hover:text-gray-300 uppercase"
                >Skills</a
              >
            </li>
            <li class="link text-[20px] font-bold">
              <a
                href="#certification"
                class="hover:underline hover:text-gray-300 uppercase"
                >Certification</a
              >
            </li>
            <li class="link text-[20px] font-bold">
              <a href="" class="hover:underline hover:text-gray-300 uppercase"
                >none</a
              >
            </li>
          </ul>
        </div>
      </nav>
      <main>
        <div class="content">
          <div
            class="hero bg-[url('/images/bg-design.avif')] w-full bg-no-repeat bg-cover bg-blend-multiply bg-teal-950 h-217"
          >
            <div
              class="hero-child flex items-center justify-between container mx-auto mb-10 -mt-25 gap-10 h-full"
              id="hero"
            >
              <div class="hero-content w-[55%]">
                <div class="name">
                  <h1 class="text-7xl font-bold mb-5 font-[tahoma]">
                    Akhtar Katbrahman
                  </h1>
                </div>
                <div class="desc w-[95%] mb-5">
                  <p class="text-2xl text-gray-300">
                    Hey eveyone, I am Frontend Developer with skills like HTML,
                    CSS and JavaScript. I am Passionate about my work.
                  </p>
                </div>
                <div class="hero-btns mt-7.5">
                  <a
                    href="https://linkedin.com/in/akhtar-katbrahman"
                    target="_blank"
                    class="text-black font-bold rounded-lg cursor-pointer text-3xl px-7 text-center py-2 bg-cyan-500 shadow-lg shadow-cyan-500/50 w-50 hover:bg-cyan-700 hover:shadow-cyan-700"
                  >
                    Linkedin
                  </a>
                  <a
                    href="https://github.com/akhtarkatbrahman"
                    target="_blank"
                    class="text-black font-bold rounded-lg cursor-pointer text-3xl px-7 text-center py-2 bg-cyan-500 shadow-lg shadow-cyan-500/50 w-50 hover:bg-cyan-700 hover:shadow-cyan-700 ml-6"
                  >
                    Github
                  </a>
                </div>
              </div>
              <div class="hero-image">
                <div class="image-bg rounded-full h-[110%]">
                  <img src="images/myPic2.png" alt="myImage" class="" />
                </div>
              </div>
            </div>
          </div>
          <div
            class="about container flex items-center justify-between mx-auto my-10"
            id="about"
          >
            <div class="about-content">
              <h2
                class="uppercase font-[cursive] text-3xl font-bold text-gray-400"
              >
                About
              </h2>
            </div>
          </div>
        </div>
      </main>
    </div>
  </body>
</html>
